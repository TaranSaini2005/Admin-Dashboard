<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Admin Dashboard</title>
</head>
<body>
      <div class="container">
          <div class="header">
                <div class="header-input">Input</div>
                <div class="header-profile-left">Profile Left</div>
                <div class="header-profile-right">Profile Right</div>

                <div class="header-options">
                    <button>New</button> 
                    <button>Upload</button> 
                    <button>Share</button>  
                </div>
          </div>

          <div class="sidebar">

            <ul class="sidebar-logo">
                <li>    
                    <img src="Icons/dashboard.svg" alt="Dashboard Icon" width="40" height="40" style="color: rgb(255, 255, 255);">
                    Dashboard
                 </li>
            </ul>

            <ul class="sidebar-links">
                <li>
                    <img class="sidebar-icon" src="Icons/home.svg" alt="Home Icon">
                    Home
                </li>
                <li>
                    <img class="sidebar-icon" src="Icons/profile.svg" alt="Profle Icon">
                    Profile
                </li>
                <li>
                    <img class="sidebar-icon" src="Icons/message.svg" alt="Message Icon">
                    Messages
                </li>
                <li>
                    <img class="sidebar-icon" src="Icons/history.svg" alt="History Icon">
                    History
                </li>
                <li>
                    <img class="sidebar-icon" src="Icons/tasks.svg" alt="Task Icon">
                    Tasks
                </li>
                <li>
                    <img class="sidebar-icon" src="Icons/communities.svg" alt="Communities Icon">
                    Communities
                </li>
            </ul>

            <ul class="sidebar-links">
                <li>
                    <img class="sidebar-icon" src="Icons/settings.svg" alt="Settings Icon">
                    Settings
                </li>
                <li>
                    <img class="sidebar-icon" src="Icons/support.svg" alt="Support Icon">
                    Support
                </li>
                <li>
                    <img class="sidebar-icon" src="Icons/privacy.svg" alt="Privacy Icon">
                    Privacy
                </li>
            </ul>

          </div>

          <div class="main">
                <div class="main-projects">Projects</div>
                <div class="main-announcements">Announcements</div>
                <div class="main-trending">Trending</div>
          </div>
      </div>
</body>
</html>
